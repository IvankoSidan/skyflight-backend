version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skyflight_db
    environment:
      POSTGRES_DB: flights_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ThreeS9379992aca
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flights_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build: .
    container_name: skyflight_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flights_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ThreeS9379992aca
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -Djava.net.preferIPv4Stack=true"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data: