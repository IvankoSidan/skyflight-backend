<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>SkyFlight | Ticket Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ============================================
               RESET & BASE STYLES
               ============================================ */
    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --primary: #4A6BFF;
        --primary-dark: #3A56D4;
        --primary-light: #6C38FF;
        --error-color: #EF4444;
        --error-dark: #DC2626;
        --error-light: #FCA5A5;
        --gray-50: #F9FAFB;
        --gray-100: #F3F4F6;
        --gray-200: #E5E7EB;
        --gray-300: #D1D5DB;
        --gray-400: #9CA3AF;
        --gray-500: #6B7280;
        --gray-600: #4B5563;
        --gray-700: #374151;
        --gray-800: #1F2937;
        --gray-900: #111827;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        --radius-sm: 0.375rem;
        --radius: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;
        --radius-2xl: 1.5rem;
        --radius-3xl: 2rem;
        --radius-full: 9999px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        font-family: var(--font-family);
        font-size: 0.875rem;
        line-height: 1.6;
        color: #FFFFFF;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: radial-gradient(ellipse at 30% 20%, #1A1F35 0%, #0A0D1A 60%, #05070F 100%);
        position: relative;
        overflow: hidden;
    }

    /* ============================================
               BACKGROUND ANIMATIONS
               ============================================ */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(circle at 20% 30%, rgba(74, 107, 255, 0.12) 0%, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(108, 56, 255, 0.08) 0%, transparent 50%),
            radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.04) 0%, transparent 70%);
        z-index: 0;
        pointer-events: none;
        animation: bgPulse 8s ease-in-out infinite;
    }

    @keyframes bgPulse {
        0%,
        100% {
            opacity: 0.6;
            transform: scale(1);
        }
        50% {
            opacity: 1;
            transform: scale(1.05);
        }
    }

    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.3), transparent),
            radial-gradient(2px 2px at 40% 70%, rgba(255, 255, 255, 0.2), transparent),
            radial-gradient(2px 2px at 60% 20%, rgba(255, 255, 255, 0.3), transparent),
            radial-gradient(2px 2px at 80% 80%, rgba(255, 255, 255, 0.2), transparent),
            radial-gradient(1px 1px at 10% 50%, rgba(255, 255, 255, 0.4), transparent),
            radial-gradient(1px 1px at 90% 40%, rgba(255, 255, 255, 0.3), transparent),
            radial-gradient(1px 1px at 50% 10%, rgba(255, 255, 255, 0.2), transparent),
            radial-gradient(1px 1px at 70% 90%, rgba(255, 255, 255, 0.3), transparent);
        background-size: 200px 200px;
        background-repeat: repeat;
        z-index: 0;
        pointer-events: none;
        opacity: 0.3;
        animation: starFloat 20s linear infinite;
    }

    @keyframes starFloat {
        0% {
            transform: translate(0, 0) rotate(0deg);
        }
        100% {
            transform: translate(100px, -50px) rotate(360deg);
        }
    }

    /* ============================================
               FLOATING PARTICLES
               ============================================ */
    .particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
    }

    .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: floatParticle linear infinite;
    }

    .particle:nth-child(1) {
        left: 10%;
        top: 20%;
        animation-duration: 15s;
        animation-delay: 0s;
        width: 6px;
        height: 6px;
    }

    .particle:nth-child(2) {
        left: 25%;
        top: 60%;
        animation-duration: 18s;
        animation-delay: 2s;
        width: 3px;
        height: 3px;
    }

    .particle:nth-child(3) {
        left: 45%;
        top: 10%;
        animation-duration: 12s;
        animation-delay: 4s;
        width: 5px;
        height: 5px;
    }

    .particle:nth-child(4) {
        left: 70%;
        top: 40%;
        animation-duration: 20s;
        animation-delay: 1s;
        width: 4px;
        height: 4px;
    }

    .particle:nth-child(5) {
        left: 85%;
        top: 70%;
        animation-duration: 14s;
        animation-delay: 3s;
        width: 3px;
        height: 3px;
    }

    .particle:nth-child(6) {
        left: 50%;
        top: 80%;
        animation-duration: 16s;
        animation-delay: 5s;
        width: 6px;
        height: 6px;
    }

    .particle:nth-child(7) {
        left: 15%;
        top: 90%;
        animation-duration: 22s;
        animation-delay: 2.5s;
        width: 4px;
        height: 4px;
    }

    .particle:nth-child(8) {
        left: 60%;
        top: 30%;
        animation-duration: 13s;
        animation-delay: 3.5s;
        width: 5px;
        height: 5px;
    }

    @keyframes floatParticle {
        0% {
            transform: translate(0, 0) scale(1);
            opacity: 0;
        }
        10% {
            opacity: 0.5;
        }
        90% {
            opacity: 0.5;
        }
        100% {
            transform: translate(var(--tx, 50px), var(--ty, -100px)) scale(0);
            opacity: 0;
        }
    }

    .particle:nth-child(1) {
        --tx: 80px;
        --ty: -150px;
    }
    .particle:nth-child(2) {
        --tx: -60px;
        --ty: -200px;
    }
    .particle:nth-child(3) {
        --tx: 100px;
        --ty: -120px;
    }
    .particle:nth-child(4) {
        --tx: -80px;
        --ty: -180px;
    }
    .particle:nth-child(5) {
        --tx: 60px;
        --ty: -140px;
    }
    .particle:nth-child(6) {
        --tx: -40px;
        --ty: -160px;
    }
    .particle:nth-child(7) {
        --tx: 90px;
        --ty: -130px;
    }
    .particle:nth-child(8) {
        --tx: -70px;
        --ty: -190px;
    }

    /* ============================================
               CONTAINER
               ============================================ */
    .error-container {
        max-width: 480px;
        width: 100%;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    /* ============================================
               GLASS ERROR CARD
               ============================================ */
    .glass-error {
        background: rgba(18, 24, 42, 0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: var(--radius-3xl);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 3rem 2.5rem 3.5rem;
        text-align: center;
        box-shadow:
            0 30px 60px -20px rgba(0, 0, 0, 0.8),
            inset 0 1px 0 rgba(255, 255, 255, 0.08),
            0 0 40px rgba(74, 107, 255, 0.05);
        animation: errorSlideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        transform-origin: center;
        position: relative;
        overflow: hidden;
        transition: var(--transition);
    }

    .glass-error:hover {
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow:
            0 35px 70px -20px rgba(0, 0, 0, 0.9),
            inset 0 1px 0 rgba(255, 255, 255, 0.12),
            0 0 60px rgba(74, 107, 255, 0.08);
    }

    /* Glass shimmer effect */
    .glass-error::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
        pointer-events: none;
        animation: shimmer 8s ease-in-out infinite;
    }

    @keyframes shimmer {
        0%,
        100% {
            transform: translate(-10%, -10%) rotate(0deg);
        }
        50% {
            transform: translate(10%, 10%) rotate(5deg);
        }
    }

    @keyframes errorSlideIn {
        from {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* ============================================
               ERROR ICON
               ============================================ */
    .error-icon {
        width: 110px;
        height: 110px;
        background: rgba(239, 68, 68, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 3.5rem;
        color: var(--error-light);
        border: 2px solid rgba(239, 68, 68, 0.3);
        backdrop-filter: blur(8px);
        position: relative;
        transition: var(--transition);
        animation: iconPulse 3s ease-in-out infinite;
    }

    .error-icon:hover {
        transform: scale(1.05);
        border-color: rgba(239, 68, 68, 0.6);
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
    }

    @keyframes iconPulse {
        0%,
        100% {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2);
        }
        50% {
            box-shadow: 0 0 30px 10px rgba(239, 68, 68, 0.1);
        }
    }

    .error-icon::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid rgba(239, 68, 68, 0.1);
        animation: ringPulse 2s ease-out infinite;
    }

    @keyframes ringPulse {
        0% {
            transform: scale(1);
            opacity: 1;
        }
        100% {
            transform: scale(1.4);
            opacity: 0;
        }
    }

    .error-icon i {
        position: relative;
        z-index: 1;
    }

    /* ============================================
               TYPOGRAPHY
               ============================================ */
    h2 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #FFFFFF 0%, #C4B5FD 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.75rem;
        letter-spacing: -0.025em;
    }

    .error-message {
        font-size: 0.9375rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.7);
        margin: 1rem 0 2rem;
        padding: 0 0.5rem;
        min-height: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ============================================
               ERROR CODE BADGE
               ============================================ */
    .error-code {
        background: rgba(255, 255, 255, 0.06);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        font-family: 'Inter', monospace;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.05em;
        margin-bottom: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: var(--transition);
    }

    .error-code:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
    }

    .error-code i {
        color: var(--error-light);
    }

    /* ============================================
               ACTION BUTTONS
               ============================================ */
    .action-group {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 0.5rem;
    }

    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.875rem 1.5rem;
        border-radius: var(--radius-full);
        font-weight: 600;
        font-size: 0.9375rem;
        border: none;
        cursor: pointer;
        transition: var(--transition);
        text-decoration: none;
        position: relative;
        overflow: hidden;
    }

    .btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
        opacity: 0;
        transition: var(--transition);
    }

    .btn:hover::before {
        opacity: 1;
    }

    .btn:active {
        transform: scale(0.97);
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: white;
        box-shadow: 0 8px 24px rgba(74, 107, 255, 0.3);
    }

    .btn-primary:hover {
        box-shadow: 0 12px 32px rgba(74, 107, 255, 0.4);
        transform: translateY(-2px);
    }

    .btn-primary:active {
        transform: scale(0.97) translateY(0);
    }

    .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #E2E8F0;
        backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.25);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-secondary:active {
        transform: scale(0.97) translateY(0);
    }

    .btn i {
        font-size: 1rem;
    }

    /* ============================================
               HELP TEXT
               ============================================ */
    .help-text {
        margin-top: 2rem;
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        flex-wrap: wrap;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.35);
    }

    .help-text span {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: var(--transition);
        cursor: default;
    }

    .help-text span:hover {
        color: rgba(255, 255, 255, 0.6);
    }

    .help-text i {
        font-size: 0.75rem;
    }

    /* ============================================
               BOTTOM BAR
               ============================================ */
    .bottom-bar {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.6875rem;
        color: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        letter-spacing: 0.02em;
    }

    .bottom-bar i {
        font-size: 0.625rem;
    }

    /* ============================================
               TOAST NOTIFICATION
               ============================================ */
    .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: 90%;
        width: 460px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(24px);
        border-radius: var(--radius-full);
        padding: 0.875rem 1.5rem;
        text-align: center;
        font-weight: 500;
        font-size: 0.875rem;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.12);
        z-index: 9999;
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
        transition: opacity 0.4s ease, transform 0.4s ease;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* ============================================
               RESPONSIVE DESIGN
               ============================================ */
    @media (max-width: 768px) {
        body {
            padding: 1rem;
        }

        .glass-error {
            padding: 2.5rem 1.75rem 3rem;
            border-radius: var(--radius-2xl);
        }

        .error-icon {
            width: 90px;
            height: 90px;
            font-size: 2.8rem;
        }

        h2 {
            font-size: 1.625rem;
        }

        .error-message {
            font-size: 0.875rem;
            margin: 0.75rem 0 1.5rem;
        }

        .btn {
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
        }

        .help-text {
            gap: 1rem;
            font-size: 0.6875rem;
        }

        .error-code {
            font-size: 0.6875rem;
            padding: 0.375rem 1rem;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 0.75rem;
        }

        .glass-error {
            padding: 2rem 1.25rem 2.5rem;
            border-radius: var(--radius-xl);
        }

        .error-icon {
            width: 75px;
            height: 75px;
            font-size: 2.25rem;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.375rem;
        }

        .error-message {
            font-size: 0.8125rem;
            padding: 0;
            min-height: 2.5rem;
        }

        .action-group {
            gap: 0.5rem;
        }

        .btn {
            padding: 0.625rem 1rem;
            font-size: 0.8125rem;
            gap: 0.5rem;
        }

        .help-text {
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1.5rem;
            font-size: 0.625rem;
        }

        .error-code {
            font-size: 0.625rem;
            padding: 0.25rem 0.875rem;
            margin-bottom: 1.5rem;
        }

        .bottom-bar {
            font-size: 0.625rem;
            margin-top: 1rem;
        }

        .toast {
            padding: 0.75rem 1rem;
            font-size: 0.8125rem;
            bottom: 1rem;
            width: calc(100% - 2rem);
        }
    }

    @media (max-width: 360px) {
        .glass-error {
            padding: 1.5rem 1rem 2rem;
        }

        .error-icon {
            width: 65px;
            height: 65px;
            font-size: 1.75rem;
        }

        h2 {
            font-size: 1.25rem;
        }

        .btn {
            font-size: 0.75rem;
            padding: 0.5rem 0.875rem;
        }
    }

    /* ============================================
               DARK MODE SUPPORT
               ============================================ */
    @media (prefers-color-scheme: light) {
        body {
            background: radial-gradient(ellipse at 30% 20%, #E8ECF6 0%, #D5DCE8 60%, #C5CDDE 100%);
        }

        body::before {
            background:
                radial-gradient(circle at 20% 30%, rgba(74, 107, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(108, 56, 255, 0.1) 0%, transparent 50%);
        }

        .glass-error {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.15);
        }

        .glass-error:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        h2 {
            background: linear-gradient(135deg, #1A1F35 0%, #4A6BFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-message {
            color: rgba(0, 0, 0, 0.7);
        }

        .error-code {
            color: rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.12);
            color: #1A1F35;
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
        }

        .help-text {
            color: rgba(0, 0, 0, 0.3);
        }

        .help-text span:hover {
            color: rgba(0, 0, 0, 0.5);
        }

        .bottom-bar {
            color: rgba(0, 0, 0, 0.2);
        }

        .error-icon {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.25);
        }

        .toast {
            background: rgba(255, 255, 255, 0.95);
            color: #1A1F35;
            border-color: rgba(0, 0, 0, 0.08);
        }

        .particle {
            background: rgba(0, 0, 0, 0.06);
        }
    }

    /* ============================================
               REDUCED MOTION
               ============================================ */
    @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }

        .glass-error {
            animation: none;
            opacity: 1;
            transform: none;
        }
    }
  </style>
</head>
<body>
<!-- Particles -->
<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Error Container -->
<div class="error-container">
  <div class="glass-error">
    <!-- Icon -->
    <div class="error-icon">
      <i class="fas fa-ticket-alt"></i>
    </div>

    <!-- Title -->
    <h2>Ticket Not Found</h2>

    <!-- Dynamic Message -->
    <div class="error-message" id="dynamicErrorMsg">
      The ticket you're looking for doesn't exist or has been removed.
    </div>

    <!-- Error Code -->
    <div class="error-code">
      <i class="fas fa-code-branch"></i>
      Error: 404 · TKT_MISSING
    </div>

    <!-- Actions -->
    <div class="action-group">
      <button class="btn btn-primary" id="goHomeBtn">
        <i class="fas fa-home"></i>
        Go to SkyFlight
      </button>
      <button class="btn btn-secondary" id="contactSupportBtn">
        <i class="fas fa-headset"></i>
        Contact Support
      </button>
    </div>

    <!-- Help Text -->
    <div class="help-text">
      <span><i class="fas fa-envelope"></i> support@skyflight.com</span>
      <span><i class="fas fa-phone-alt"></i> +1 (888) 456-7890</span>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <i class="fas fa-lock"></i>
    Secure connection · Report an issue
  </div>
</div>

<!-- Toast Container -->
<div class="toast" id="toast"></div>

<script>
  // ============================================
  // DYNAMIC ERROR MESSAGE
  // ============================================
  (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const errorType = urlParams.get('error');
      const errorMsgSpan = document.getElementById('dynamicErrorMsg');

      const errorMessages = {
          'expired': 'This boarding pass has expired. Please check your upcoming trips.',
          'invalid': 'Invalid ticket ID. The link may be broken or incorrect.',
          'cancelled': 'This ticket has been cancelled. Please contact support for assistance.',
          'notfound': 'The ticket you\'re looking for doesn\'t exist or has been removed.'
      };

      if (errorMsgSpan && errorType && errorMessages[errorType]) {
          errorMsgSpan.textContent = errorMessages[errorType];
      }
  })();

  // ============================================
  // TOAST NOTIFICATION SYSTEM
  // ============================================
  const toast = document.getElementById('toast');

  function showToast(message, duration = 2200) {
      if (!toast) return;

      toast.textContent = message;
      toast.classList.add('show');

      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
          toast.classList.remove('show');
      }, duration);
  }

  // ============================================
  // BUTTON HANDLERS
  // ============================================
  const homeBtn = document.getElementById('goHomeBtn');
  const supportBtn = document.getElementById('contactSupportBtn');

  if (homeBtn) {
      homeBtn.addEventListener('click', function(e) {
          e.preventDefault();
          showToast('✨ Redirecting to SkyFlight booking hub...');
          setTimeout(() => {
              window.location.href = 'https://skyflightbooking.ru';
          }, 700);
      });
  }

  if (supportBtn) {
      supportBtn.addEventListener('click', function(e) {
          e.preventDefault();
          showToast('📞 Connecting to support chat...');
          // Could open a modal or email client
          setTimeout(() => {
              // Simulate opening support
              const supportLink = document.createElement('a');
              supportLink.href = 'mailto:support@skyflight.com?subject=Ticket%20Support%20Request';
              supportLink.click();
          }, 500);
      });
  }

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
          const activeElement = document.activeElement;
          if (activeElement && (activeElement.id === 'goHomeBtn' || activeElement.id === 'contactSupportBtn')) {
              e.preventDefault();
              activeElement.click();
          }
      }

      if (e.key === 'Escape') {
          toast.classList.remove('show');
      }

      if (e.key === 'h' || e.key === 'H') {
          if (homeBtn) homeBtn.click();
      }

      if (e.key === 's' || e.key === 'S') {
          if (supportBtn) supportBtn.click();
      }
  });

  // ============================================
  // CONSOLE INFO
  // ============================================
  console.log('%c✈️ SkyFlight Error Page', 'font-size: 20px; font-weight: bold; color: #4A6BFF;');
  console.log('%cTicket not found | Error: 404', 'font-size: 14px; color: #9CA3AF;');
  console.log('%cUse ?error=expired | invalid | cancelled | notfound to test different messages', 'font-size: 12px; color: #6B7280;');
  console.log('%cKeyboard shortcuts: H - Home, S - Support, ESC - Close toast', 'font-size: 12px; color: #6B7280;');

  // ============================================
  // SMOOTH APPEARANCE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
      const container = document.querySelector('.glass-error');
      if (container) {
          container.style.opacity = '0';
          container.style.transform = 'scale(0.95) translateY(20px)';
          requestAnimationFrame(() => {
              container.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1)';
              container.style.opacity = '1';
              container.style.transform = 'scale(1) translateY(0)';
          });
      }
  });
</script>
</body>
</html>
